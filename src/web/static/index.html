<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octotrace</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="input-bar">
        <input type="text" id="address-input" placeholder="Enter wallet address or TX ID">
        <select id="chain-select">
            <option value="ETH">Ethereum</option>
            <option value="TRON">Tron</option>
        </select>
        <input type="date" id="date-from">
        <input type="date" id="date-to">
        <input type="number" id="min-amount" value="1" min="0" step="0.01" 
               style="width:80px" title="Monto mínimo USDT">
        <label for="min-amount">min USDT</label>
        <button id="search-btn">Search</button>
        <button id="clear-btn" title="Limpiar grafo">🗑 Limpiar</button>
    </div>
    
    <div id="graph-container"></div>
    
    <div id="panel-resize-handle"></div>
    <div id="side-panel">
        <button id="panel-close">✕</button>
        <div id="panel-content"></div>
    </div>

    <!-- Vendor libraries (CDN order matters) -->
    <script src="/static/vendor/cytoscape.min.js"></script>
    <script src="/static/vendor/dagre.min.js"></script>
    <script src="/static/vendor/cytoscape-dagre.min.js"></script>
    
    <!-- Application modules (order matters) -->
    <script src="/static/app.js"></script>
    <script src="/static/graph.js"></script>
    <script src="/static/panel.js"></script>
</body>
</html>
